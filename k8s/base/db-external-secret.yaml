# Using external-secrets-operator to pull DB creds from cloud provider
# AWS: AWS Secrets Manager
# Azure: Azure Key Vault
# This ensures NO secrets are stored in Git or K8s manifests
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cloud-secret-store  # Patched per-cloud in overlay
    kind: ClusterSecretStore
  target:
    name: db-credentials
  data:
    - secretKey: url
      remoteRef:
        key: multicloud/db-url  # Patched per-cloud in overlay
